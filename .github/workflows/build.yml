name: CI/CD (Love)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep -oP 'return "\K[^"]*' version.lua)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        
      - name: Check if release for version exists
        id: version_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if gh release view "v$VERSION" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Package .love file
        run: zip -9 -r ${{ github.event.repository.name }}.love . -x ".git/*" ".github/*" ".vscode/*"
      
      - name: Build WASM
        run: |
          # Pull only /11.5/ and player.js from 2dengine/love.js
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/2dengine/love.js.git love-js-repo
          cd love-js-repo
          git sparse-checkout set 11.5 lua
          git checkout HEAD -- player.js
          cd ..

          # Assemble the wasm package
          mkdir -p wasm-out
          cp ${{ github.event.repository.name }}.love wasm-out/
          cp -r love-js-repo/11.5 wasm-out/11.5
          cp -r love-js-repo/lua wasm-out/lua
          cp love-js-repo/player.js wasm-out/player.js
          cp wasm/index.html wasm-out/index.html
          cp wasm/server.py wasm-out/server.py
          cp wasm/dockerfile wasm-out/dockerfile
          cp wasm/favicon.ico wasm-out/favicon.ico
 
          zip -9 -r ${{ github.event.repository.name }}-wasm.zip wasm-out/

      - name: Build Windows 64-bit
        run: |
          mkdir -p releases/win64
          curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip -o love-win.zip
          unzip love-win.zip
          
          cat love-11.5-win64/love.exe ${{ github.event.repository.name }}.love > releases/win64/${{ github.event.repository.name }}.exe
          
          cp love-11.5-win64/*.dll releases/win64/
          cp love-11.5-win64/license.txt releases/win64/
          cd releases && zip -r ../${{ github.event.repository.name }}-win64.zip win64/

      - name: Prepare Linux .love Artifact
        run: cp ${{ github.event.repository.name }}.love ${{ github.event.repository.name }}-linux.love

      - name: Build macOS Artifact
        run: |
          curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-macos.zip -o love-macos.zip
          unzip love-macos.zip

          mv love.app ${{ github.event.repository.name }}.app

          cp ${{ github.event.repository.name }}.love ${{ github.event.repository.name }}.app/Contents/Resources/

          # Update Info.plist
          sed -i '' 's|org.love2d.love|com.${{ github.event.repository.owner.login }}.${{ github.event.repository.name }}|g' \
            ${{ github.event.repository.name }}.app/Contents/Info.plist
          sed -i 's|<string>LÖVE</string>|<string>${{ github.event.repository.name }}</string>|' \
            ${{ github.event.repository.name }}.app/Contents/Info.plist

          # Remove UTExportedTypeDeclarations section
          python3 -c "
          import re, sys
          content = open('${{ github.event.repository.name }}.app/Contents/Info.plist').read()
          content = re.sub(r'<key>UTExportedTypeDeclarations</key>.*?</array>', '', content, flags=re.DOTALL)
          open('${{ github.event.repository.name }}.app/Contents/Info.plist', 'w').write(content)
          "

          # -y preserves symlinks
          zip -9 -ry ${{ github.event.repository.name }}-macos.zip ${{ github.event.repository.name }}.app/

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          files: |
            ${{ github.event.repository.name }}-win64.zip
            ${{ github.event.repository.name }}-linux.love
            ${{ github.event.repository.name }}-wasm.zip
            ${{ github.event.repository.name }}-macos.zip
          name: Release ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}