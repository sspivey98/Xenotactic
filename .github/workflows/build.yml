name: Build & Release (Love2D)

on:
  push:
    tags:
      - 'v*'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Version into conf.lua
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ -f "conf.lua" ]; then
            sed -i 's/t.window.title = ".*"/t.window.title = "Xenotactic ${{ github.ref_name }}"/g' conf.lua
          fi

      - name: Package .love file
        run: zip -9 -r ${{ github.event.repository.name }}.love . -x ".git/*" ".github/*"

      - name: Build Binaries
        uses: multi-gons/love-release@v2
        with:
          name: ${{ github.event.repository.name }}
          love_version: 11.5
          platforms: win64 linux
          icon_win: assets/turret_gatling.ico

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}