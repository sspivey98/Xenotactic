name: CI/CD (Love)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip nodejs npm

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep -oP 'return "\K[^"]*' version.lua)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        
      - name: Check if version changed
        id: version_check
        run: |
          git show HEAD~1:version.lua > /tmp/old_version.lua 2>/dev/null || echo 'return ""' > /tmp/old_version.lua
          OLD_VERSION=$(grep -oP 'return "\K[^"]*' /tmp/old_version.lua || echo "")
          
          if [ "${{ steps.get_version.outputs.version }}" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Package .love file
        run: zip -9 -r ${{ github.event.repository.name }}.love . -x ".git/*" ".github/*"
      
      - name: Build WASM file
        run: |
          sudo npm install -g love.js
          love.js ${{ github.event.repository.name }}-linux.love game -c
          zip -9 -r ${{ github.event.repository.name }}-wasm.zip game/

      - name: Build Windows 64-bit
        run: |
          mkdir -p releases/win64
          curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip -o love-win.zip
          unzip love-win.zip
          
          cat love-11.5-win64/love.exe ${{ github.event.repository.name }}.love > releases/win64/${{ github.event.repository.name }}.exe
          
          cp love-11.5-win64/*.dll releases/win64/
          cp love-11.5-win64/license.txt releases/win64/
          cd releases && zip -r ../${{ github.event.repository.name }}-win64.zip win64/

      - name: Prepare Linux .love Artifact
        run: cp ${{ github.event.repository.name }}.love ${{ github.event.repository.name }}-linux.love

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          files: |
            ${{ github.event.repository.name }}-win64.zip
            ${{ github.event.repository.name }}-linux.love
            ${{ github.event.repository.name }}-wasm.zip
          name: Release ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}